<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/246f3ed870.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <title>VALORANT Main Menu</title>
</head>

<body>
    <div class="menu" style="display:none;">
        <ul>
            <li><a href="#">Play</a></li>
            <li><a href="#">Career</a></li>
            <li><a href="#">Battlepass</a></li>
            <li><a href="#">Collection</a></li>
            <li><a href="#">Store</a></li>
        </ul>
    </div>
    <span
        style="font-size: 60px;color: white;font-family: 'Oswald', sans-serif;text-align:center;margin: 48px;">VALORANT
        Main Menu
        Recreation</span>
    <audio id="bg-audio" loop autoplay>
        <source src="bgmusic.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</body>

<script type="text/javascript">
    jQuery(document).ready(function () {
        setTimeout(function () {
            jQuery('.menu').fadeIn(750);
        }, 700);
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var audio = document.getElementById('bg-audio');
        var context = new AudioContext();
        var source = context.createMediaElementSource(audio);
        var gainNode = context.createGain();

        // Set the initial gain to 0
        gainNode.gain.value = 0;

        // Connect the audio nodes
        source.connect(gainNode);
        gainNode.connect(context.destination);

        // Gradually increase the gain to 1 over 5 seconds
        gainNode.gain.linearRampToValueAtTime(1, context.currentTime + 10);

        // Start the audio playback
        audio.play();
    });
</script>

</html>
