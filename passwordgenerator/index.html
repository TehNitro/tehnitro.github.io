<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700;1,800&display=swap"
        rel="stylesheet">
</head>

<body>
    <iframe src="https://tehnitro.github.io/home-iframe.html" frameborder="0"
        style="position:absolute;left:0;bottom:0;margin:16px;margin-bottom:18px;z-index:9999;" width="50px"
        height="50px"></iframe>
    <div class="container">
        <h1>Password Generator</h1>
        <div class="password-container">
            <input type="number" id="length" value="12" min="6" max="30">
            <input type="text" id="password" readonly>
            <button onclick="generatePassword()">Generate Password</button>
            <button id="copy-btn" onclick="copyPassword()">Copy Password</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
